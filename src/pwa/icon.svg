<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FLEB">
  <title>FLEB</title>
  <!-- Greenbar ledger-paper stripes, modelled on favicon.ico: five equal
       horizontal bands, green / light / green / light / green. -->
  <defs>
    <clipPath id="round"><rect width="512" height="512" rx="96"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <!-- pale base = the even (light) stripes -->
    <rect width="512" height="512" fill="#e2fde3"/>
    <!-- green odd stripes at bands 0, 2, 4 (each 512/5 = 102.4 tall) -->
    <rect y="0" width="512" height="102.4" fill="#a6dda5"/>
    <rect y="204.8" width="512" height="102.4" fill="#a6dda5"/>
    <rect y="409.6" width="512" height="102.4" fill="#a6dda5"/>
  </g>
</svg>
