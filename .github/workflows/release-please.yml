name: Release Please

# Watches Conventional Commits on master and maintains a "release PR" that
# bumps package.json + CHANGELOG.md. Merging that PR tags vX.Y.Z and cuts a
# GitHub Release. It does NOT deploy: gh-pages deploy stays in webpack.yml,
# and the version bump merge re-triggers that deploy like any other push.
on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
